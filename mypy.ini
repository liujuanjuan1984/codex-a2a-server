[mypy]
python_version = 3.11
files = src/codex_a2a_server, tests/server/test_call_context_builder.py, tests/server/test_cli.py, tests/execution/test_directory_validation.py, tests/jsonrpc/test_jsonrpc_models.py, tests/package/test_release_distribution_contract.py, tests/server/test_request_handler.py, tests/config/test_settings.py, tests/execution/test_stream_chunks.py, tests/execution/test_tool_call_payloads.py, tests/package/test_version.py
mypy_path = src
follow_imports = silent
warn_unused_ignores = True
warn_redundant_casts = True
show_error_codes = True

[mypy-a2a.*]
ignore_missing_imports = True

[mypy-setuptools_scm]
ignore_missing_imports = True
