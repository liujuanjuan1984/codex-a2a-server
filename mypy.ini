[mypy]
python_version = 3.11
files = src/codex_a2a_server
follow_imports = silent
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
show_error_codes = True

[mypy-codex_a2a_server.codex_client]
ignore_errors = True

[mypy-codex_a2a_server.output_mapping]
ignore_errors = True

[mypy-codex_a2a_server.streaming]
ignore_errors = True

[mypy-codex_a2a_server.jsonrpc_ext]
ignore_errors = True

[mypy-codex_a2a_server.agent]
ignore_errors = True

[mypy-codex_a2a_server.app]
ignore_errors = True
